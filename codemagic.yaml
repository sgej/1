workflows:
  ios_build:
    name: iOS Build (Xcode)
    max_build_duration: 120

    environment:
      xcode: latest
      cocoapods: default

      vars:
        PROJECT: ""        # 填 .xcodeproj 文件名，例如 MyApp.xcodeproj（或留空并使用 WORKSPACE）
        WORKSPACE: ""      # 填 .xcworkspace 名称（若使用 CocoaPods 或 workspace）
        SCHEME: ""         # Xcode scheme 名称（必填）
        EXPORT_METHOD: "app-store" # app-store / ad-hoc / development / enterprise

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Prepare
        script: |
          echo "PROJECT=$PROJECT"
          echo "WORKSPACE=$WORKSPACE"
          echo "SCHEME=$SCHEME"
          echo "EXPORT_METHOD=$EXPORT_METHOD"

      - name: Install CocoaPods if needed
        script: |
          if [ -f Podfile ]; then
            pod repo update
            pod install --silent
          fi

      - name: Clean previous builds
        script: |
          rm -rf build
          mkdir -p build

      - name: Archive (xcodebuild archive)
        script: |
          set -e
          ARCHIVE_PATH=build/${SCHEME}.xcarchive
          if [ -n "$WORKSPACE" ]; then
            echo "Using workspace: $WORKSPACE"
            xcodebuild archive -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release -archivePath "$ARCHIVE_PATH" -destination "generic/platform=iOS" | xcpretty || true
          elif [ -n "$PROJECT" ]; then
            echo "Using project: $PROJECT"
            xcodebuild archive -project "$PROJECT" -scheme "$SCHEME" -configuration Release -archivePath "$ARCHIVE_PATH" -destination "generic/platform=iOS" | xcpretty || true
          else
            echo "ERROR: PROJECT or WORKSPACE must be set."
            exit 1
          fi

      - name: Export IPA
        script: |
          EXPORT_OPTIONS=build/exportOptions.plist
          cat > "$EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive -archivePath build/${SCHEME}.xcarchive -exportOptionsPlist "$EXPORT_OPTIONS" -exportPath build/ipa | xcpretty || true

    artifacts:
      - build/ipa/*.ipa
      - build/*.xcarchive
